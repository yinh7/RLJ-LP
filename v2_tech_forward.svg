<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="'Noto Sans JP', 'Hiragino Sans', 'Droid Sans Fallback', sans-serif">
  <!-- V2: Tech Forward — 先進のプラットフォーム -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1E42"/>
      <stop offset="50%" stop-color="#0A1735"/>
      <stop offset="100%" stop-color="#06102A"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient2)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Header: Logo + Nav -->
  <g transform="translate(120, 70)">
    <text x="0" y="30" font-family="'Playfair Display', 'Georgia', serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="3">RemoteLOCK</text>
    <text x="0" y="52" font-size="11" fill="#D4AF37" letter-spacing="6">HOSPITALITY</text>
  </g>
  <g transform="translate(1310, 85)" font-size="14" fill="#CFD6E3">
    <text x="0" y="0">特長</text>
    <text x="70" y="0">機能</text>
    <text x="140" y="0">導入事例</text>
    <text x="240" y="0">連携サービス</text>
    <text x="360" y="0">FAQ</text>
  </g>
  <g transform="translate(1700, 68)">
    <rect x="0" y="0" width="160" height="38" rx="2" fill="#D4AF37"/>
    <text x="80" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#0F1E42">資料請求</text>
  </g>

  <!-- LEFT PANEL: Copy -->
  <g transform="translate(120, 340)">
    <!-- Kicker -->
    <text x="0" y="0" font-family="'Playfair Display', 'Georgia', serif" font-size="16" fill="#D4AF37" letter-spacing="8" font-style="italic">HOSPITALITY OS</text>

    <!-- Gold accent line -->
    <rect x="0" y="20" width="60" height="2" fill="#D4AF37"/>

    <!-- Headline (2 lines) -->
    <text x="0" y="100" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="66" font-weight="700" fill="#FFFFFF">ホテル運営を、</text>
    <text x="0" y="180" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="66" font-weight="700" fill="#FFFFFF">1台のスマートロックで</text>
    <text x="0" y="260" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="66" font-weight="700" fill="#FFFFFF">終わらせない。</text>

    <!-- Sub-copy -->
    <text x="0" y="340" font-size="20" font-weight="300" fill="#CFD6E3">60以上のPMS・OTA・セルフチェックインと繋がる、</text>
    <text x="0" y="372" font-size="20" font-weight="300" fill="#CFD6E3">ホテル運営のオープンプラットフォーム。</text>

    <!-- CTA Row -->
    <g transform="translate(0, 430)">
      <!-- Primary -->
      <rect x="0" y="0" width="220" height="60" rx="2" fill="#D4AF37"/>
      <text x="110" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#0F1E42">資料請求はこちら</text>
      <text x="205" y="38" font-size="15" fill="#0F1E42">→</text>
    </g>
    <g transform="translate(240, 430)">
      <!-- Secondary -->
      <rect x="0" y="0" width="240" height="60" rx="2" fill="none" stroke="#CFD6E3" stroke-width="1"/>
      <text x="120" y="38" text-anchor="middle" font-size="15" font-weight="400" fill="#FFFFFF">オンラインデモ予約</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Network visualization -->
  <g transform="translate(1420, 540)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="360" fill="url(#centerGlow)"/>

    <!-- Connection lines (to satellites) -->
    <g stroke="#D4AF37" stroke-width="1" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-260"/>
      <line x1="0" y1="0" x2="184" y2="-184"/>
      <line x1="0" y1="0" x2="260" y2="0"/>
      <line x1="0" y1="0" x2="184" y2="184"/>
      <line x1="0" y1="0" x2="0" y2="260"/>
      <line x1="0" y1="0" x2="-184" y2="184"/>
      <line x1="0" y1="0" x2="-260" y2="0"/>
      <line x1="0" y1="0" x2="-184" y2="-184"/>
    </g>

    <!-- Satellite nodes with labels -->
    <g font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
      <!-- Top -->
      <circle cx="0" cy="-260" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="0" y="-256" font-size="11" fill="#D4AF37">PMS</text>
      <!-- Top-right -->
      <circle cx="184" cy="-184" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="184" y="-180" font-size="11" fill="#D4AF37">OTA</text>
      <!-- Right -->
      <circle cx="260" cy="0" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="260" y="4" font-size="10" fill="#D4AF37">CHECK-IN</text>
      <!-- Bottom-right -->
      <circle cx="184" cy="184" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="184" y="188" font-size="10" fill="#D4AF37">CLEAN</text>
      <!-- Bottom -->
      <circle cx="0" cy="260" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="0" y="264" font-size="10" fill="#D4AF37">PAYMENT</text>
      <!-- Bottom-left -->
      <circle cx="-184" cy="184" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="-184" y="188" font-size="11" fill="#D4AF37">IoT</text>
      <!-- Left -->
      <circle cx="-260" cy="0" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="-260" y="4" font-size="11" fill="#D4AF37">BI</text>
      <!-- Top-left -->
      <circle cx="-184" cy="-184" r="38" fill="#152954" stroke="#D4AF37" stroke-width="1.2"/>
      <text x="-184" y="-180" font-size="9" fill="#D4AF37">MESSAGING</text>
    </g>

    <!-- Center node: RemoteLOCK -->
    <circle cx="0" cy="0" r="86" fill="#0F1E42" stroke="#D4AF37" stroke-width="2" filter="url(#softGlow2)"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
    <text x="0" y="-6" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="16" font-weight="700" fill="#FFFFFF" letter-spacing="2">RemoteLOCK</text>
    <text x="0" y="16" text-anchor="middle" font-size="10" fill="#D4AF37" letter-spacing="3">PLATFORM</text>

    <!-- "+52 more" indicator -->
    <g transform="translate(290, -270)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#D4AF37"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="700" fill="#0F1E42" letter-spacing="1">+52 more</text>
    </g>
  </g>

  <!-- Bottom stats strip -->
  <g transform="translate(0, 980)">
    <rect x="120" y="0" width="1680" height="1" fill="#D4AF37" opacity="0.3"/>
    <g transform="translate(960, 40)" text-anchor="middle">
      <g transform="translate(-560, 0)">
        <text x="0" y="0" font-family="'Playfair Display', 'Georgia', serif" font-size="32" font-weight="700" fill="#D4AF37">60+</text>
        <text x="0" y="26" font-size="11" fill="#8B93A8" letter-spacing="4">SYSTEM INTEGRATIONS</text>
      </g>
      <g transform="translate(-180, 0)">
        <text x="0" y="0" font-family="'Playfair Display', 'Georgia', serif" font-size="32" font-weight="700" fill="#D4AF37">75</text>
        <text x="0" y="26" font-size="11" fill="#8B93A8" letter-spacing="4">COUNTRIES DEPLOYED</text>
      </g>
      <g transform="translate(200, 0)">
        <text x="0" y="0" font-family="'Playfair Display', 'Georgia', serif" font-size="32" font-weight="700" fill="#D4AF37">Wi-Fi</text>
        <text x="0" y="26" font-size="11" fill="#8B93A8" letter-spacing="4">DIRECT, NO GATEWAY</text>
      </g>
      <g transform="translate(580, 0)">
        <text x="0" y="0" font-family="'Playfair Display', 'Georgia', serif" font-size="32" font-weight="700" fill="#D4AF37">24/7</text>
        <text x="0" y="26" font-size="11" fill="#8B93A8" letter-spacing="4">CONTINUOUS OPERATION</text>
      </g>
    </g>
  </g>
</svg>
