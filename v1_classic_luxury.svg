<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', 'Droid Sans Fallback', serif">
  <!-- V1: Classic Luxury — 静謐な高級感 -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1B2E5C"/>
      <stop offset="60%" stop-color="#0F1E42"/>
      <stop offset="100%" stop-color="#08132E"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A6D1F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8A6D1F" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>

  <!-- Subtle gold corner ornaments (symmetrical 4 corners) -->
  <g stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.35">
    <path d="M 80 80 L 80 180 M 80 80 L 180 80"/>
    <path d="M 1840 80 L 1840 180 M 1840 80 L 1740 80"/>
    <path d="M 80 1000 L 80 900 M 80 1000 L 180 1000"/>
    <path d="M 1840 1000 L 1840 900 M 1840 1000 L 1740 1000"/>
  </g>

  <!-- Logo placeholder (top-left) -->
  <g transform="translate(120, 70)">
    <text x="0" y="30" font-family="'Playfair Display', 'Georgia', serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="3">RemoteLOCK</text>
    <text x="0" y="52" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="11" fill="#D4AF37" letter-spacing="6">HOSPITALITY</text>
  </g>

  <!-- Nav placeholder (top-right) -->
  <g transform="translate(1310, 85)" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="14" fill="#CFD6E3">
    <text x="0" y="0">特長</text>
    <text x="70" y="0">機能</text>
    <text x="140" y="0">導入事例</text>
    <text x="240" y="0">連携サービス</text>
    <text x="360" y="0">FAQ</text>
  </g>
  <rect x="1830" y="60" width="1" height="1" fill="none"/>
  <!-- CTA nav button -->
  <g transform="translate(1700, 68)">
    <rect x="0" y="0" width="160" height="38" rx="2" fill="none" stroke="#D4AF37" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="13" fill="#D4AF37">資料請求</text>
  </g>

  <!-- English kicker -->
  <text x="960" y="420" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="18" fill="#D4AF37" letter-spacing="10" font-style="italic">AN ACCESS MANAGEMENT PLATFORM FOR HOSPITALITY</text>

  <!-- Gold divider -->
  <line x1="860" y1="460" x2="1060" y2="460" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Main headline (Japanese serif) -->
  <text x="960" y="580" text-anchor="middle" font-size="88" font-weight="500" fill="#FFFFFF">おもてなしに、時間を返す。</text>

  <!-- Sub-copy -->
  <text x="960" y="660" text-anchor="middle" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="22" font-weight="300" fill="#CFD6E3">60以上のシステムと繋がる、止まらないアクセス管理プラットフォーム。</text>
  <text x="960" y="695" text-anchor="middle" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="22" font-weight="300" fill="#CFD6E3">世界75か国で実証された、ホテル運営の新しい基盤。</text>

  <!-- CTA Primary (gold) -->
  <g transform="translate(770, 780)" filter="url(#softGlow)">
    <rect x="0" y="0" width="180" height="60" rx="2" fill="#D4AF37"/>
    <text x="90" y="38" text-anchor="middle" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="15" font-weight="600" fill="#0F1E42">資料請求はこちら</text>
  </g>

  <!-- CTA Secondary (outline) -->
  <g transform="translate(970, 780)">
    <rect x="0" y="0" width="180" height="60" rx="2" fill="none" stroke="#CFD6E3" stroke-width="1"/>
    <text x="90" y="38" text-anchor="middle" font-family="'Noto Sans JP', 'Droid Sans Fallback', sans-serif" font-size="15" font-weight="400" fill="#FFFFFF">オンラインデモ</text>
  </g>

  <!-- Bottom credential strip -->
  <g transform="translate(960, 960)" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" letter-spacing="6" fill="#8B93A8">
    <text x="-280" y="0" font-size="13">WORLDWIDE 75 COUNTRIES</text>
    <text x="0" y="0" font-size="13">・</text>
    <text x="0" y="0" font-size="13">60+ SYSTEM INTEGRATIONS</text>
    <text x="280" y="0" font-size="13">WI-FI DIRECT STABILITY</text>
  </g>

  <!-- Subtle motif: dotted center seam (vertical tiny dots top-to-center) -->
  <g fill="#D4AF37" opacity="0.3">
    <circle cx="960" cy="180" r="1.5"/>
    <circle cx="960" cy="220" r="1.5"/>
    <circle cx="960" cy="260" r="1.5"/>
    <circle cx="960" cy="300" r="1.5"/>
    <circle cx="960" cy="340" r="1.5"/>
  </g>
</svg>
